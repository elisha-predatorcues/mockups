<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predator Cues Archive — Slider Tabs (Carousel)</title>
<style>
  :root{
    --font-head:"Futura","Futura PT","Century Gothic","Open Sans",sans-serif;
    --font-body:"Open Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --bg:#fff;--surface:#fff;--surface-2:#f4f4f4;--surface-3:#f9f9f9;
    --line:#e0e0e0;--line-strong:#c9c9c9;
    --ink:#0a0a0a;--ink-2:#2b2b2b;--muted:#595959;
    --gold:#ffd400;--gold-tint:#fff7cc;--maxw:1240px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;line-height:1.5}
  img{display:block;max-width:100%}

  .hero{border-bottom:1px solid var(--line);padding:56px 24px 34px;text-align:center}
  .hero .eyebrow{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#fff;font-weight:700;margin-bottom:20px;display:inline-block;background:var(--ink);padding:7px 14px;border-radius:3px}
  .hero h1{font-family:var(--font-head);font-weight:700;font-size:clamp(36px,6.5vw,68px);line-height:1;text-transform:uppercase;color:var(--ink)}
  .hero h1 em{font-style:normal;position:relative}
  .hero h1 em::after{content:"";position:absolute;left:-2%;right:-2%;bottom:.06em;height:.2em;background:var(--gold);z-index:-1}
  .hero p{max-width:600px;margin:18px auto 0;color:var(--ink-2);font-size:16px;line-height:1.7}

  /* SLIDER TAB STRIP */
  .tabwrap{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--line)}
  .tabbar{max-width:var(--maxw);margin:0 auto;display:flex;align-items:stretch;position:relative}
  .tabscroll{display:flex;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;flex:1;scroll-snap-type:x proximity}
  .tabscroll::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;scroll-snap-align:start;background:none;border:none;cursor:pointer;color:var(--ink-2);font-family:var(--font-body);font-size:12.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:18px 18px 15px;border-bottom:3px solid transparent;transition:color .15s,border-color .15s,background .15s;white-space:nowrap}
  .tab:hover{color:var(--ink);background:var(--surface-3)}
  .tab[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--gold)}
  .arrow{flex:0 0 auto;width:44px;border:none;background:#fff;cursor:pointer;display:grid;place-items:center;color:var(--ink);font-size:18px;position:relative;z-index:2;transition:opacity .2s,background .15s}
  .arrow:hover{background:var(--surface-2)}
  .arrow:disabled{opacity:.25;cursor:default}
  .arrow.left{box-shadow:14px 0 14px -10px rgba(0,0,0,.12)}
  .arrow.right{box-shadow:-14px 0 14px -10px rgba(0,0,0,.12)}
  .arrow svg{width:16px;height:16px}
  .scrollbar{max-width:var(--maxw);margin:0 auto;height:2px;background:var(--surface-2);position:relative}
  .scrollbar .thumb{position:absolute;top:0;left:0;height:2px;background:var(--ink);width:20%;transition:left .1s linear,width .1s linear}

  .panel{max-width:var(--maxw);margin:0 auto;padding:34px 24px 80px;animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .panel-intro{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-bottom:6px;padding-bottom:20px;border-bottom:2px solid var(--ink)}
  .panel-intro h2{font-family:var(--font-head);font-weight:700;font-size:clamp(24px,3.6vw,38px);text-transform:uppercase;color:var(--ink)}
  .panel-intro .yr{color:var(--ink);font-weight:400;background:var(--gold);padding:2px 10px;border-radius:3px;font-size:.62em;vertical-align:middle;margin-left:8px}
  .panel-intro p{color:var(--ink-2);font-size:14px;max-width:440px}

  /* CAROUSEL */
  .carousel{position:relative;margin-top:8px}
  .carousel-track{display:flex;gap:20px;overflow-x:auto;scroll-behavior:smooth;scroll-snap-type:x mandatory;scrollbar-width:none;padding:4px 2px 14px}
  .carousel-track::-webkit-scrollbar{display:none}
  .cue{flex:0 0 auto;width:min(78%,820px);scroll-snap-align:center;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .cue-figure{background:var(--surface-3);border-bottom:1px solid var(--line);padding:36px 50px;display:flex;align-items:center;justify-content:center;min-height:220px}
  .cue-figure img{width:100%;height:auto;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(0,0,0,.18))}
  .cue-info{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;padding:22px 26px 24px}
  .cue-info .model{font-family:var(--font-head);font-weight:700;font-size:24px;color:var(--ink);text-transform:uppercase}
  .cue-info .specs{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-end}
  .cue-info .spec b{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;font-weight:700}
  .cue-info .spec span{font-size:15px;color:var(--ink);font-weight:600}
  .retired-pill{display:inline-block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:var(--ink);padding:5px 11px;border-radius:99px;font-weight:700;align-self:flex-start}
  .car-nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:4px}
  .car-arrows{display:flex;gap:8px}
  .car-btn{width:44px;height:44px;border:1px solid var(--line-strong);background:#fff;border-radius:50%;cursor:pointer;display:grid;place-items:center;color:var(--ink);transition:background .15s,border-color .15s,opacity .15s}
  .car-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
  .car-btn:disabled{opacity:.3;cursor:default}
  .car-btn:disabled:hover{background:#fff;color:var(--ink);border-color:var(--line-strong)}
  .car-btn svg{width:18px;height:18px}
  .car-dots{display:flex;gap:7px}
  .car-dot{width:8px;height:8px;border-radius:50%;background:var(--line-strong);border:none;padding:0;cursor:pointer;transition:background .15s,transform .15s}
  .car-dot[aria-current="true"]{background:var(--ink);transform:scale(1.25)}
  .car-counter{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}

  .upsell{margin:30px 0 8px;background:var(--surface-2);border:1px solid var(--line);border-left:4px solid var(--gold);border-radius:6px;padding:28px 30px}
  .upsell .kicker{display:inline-block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#fff;background:var(--ink);padding:5px 10px;border-radius:3px;font-weight:700;margin-bottom:12px}
  .upsell h3{font-family:var(--font-head);font-weight:700;font-size:21px;margin-bottom:8px;color:var(--ink);text-transform:uppercase}
  .upsell p{color:var(--ink-2);font-size:14px;max-width:580px;margin-bottom:20px}
  .upsell-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .up-card{background:var(--surface);border:1px solid var(--line);border-radius:5px;overflow:hidden;text-decoration:none;color:inherit;transition:border-color .2s,transform .2s,box-shadow .2s}
  .up-card:hover{border-color:var(--ink);transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1)}
  .up-card .thumb{aspect-ratio:16/9;background:var(--surface-3);display:grid;place-items:center;border-bottom:1px solid var(--line)}
  .up-card .thumb span{background:var(--ink);color:#fff;font-size:11px;letter-spacing:.08em;font-weight:700;padding:5px 10px;border-radius:3px}
  .up-card .body{padding:13px 15px}
  .up-card .name{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--ink)}
  .up-card .meta{font-size:13px;color:var(--muted)}
  .up-card .meta .now{color:var(--ink);font-weight:700}
  .up-cta{display:inline-flex;align-items:center;gap:9px;margin-top:22px;background:var(--ink);color:#fff;text-decoration:none;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:13px 24px;border-radius:4px;border:1px solid var(--ink);transition:background .18s,color .18s}
  .up-cta:hover{background:#fff;color:var(--ink)}
  .up-cta::after{content:"\2192"}

  @media(max-width:760px){
    .cue{width:88%}
    .cue-figure{padding:24px 22px;min-height:160px}
    .cue-info{flex-direction:column;align-items:flex-start;gap:12px;padding:18px 18px 20px}
    .upsell-grid{grid-template-columns:1fr}
    .panel{padding:24px 16px 60px}.hero{padding:42px 18px 28px}
    .arrow{display:none}.car-arrows{display:none}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto}}
</style>
</head>

// Flatten families -> a single list of series (each = one tab)
const SERIES=[];
DATA.forEach(f=>f.series.forEach(s=>SERIES.push(s)));

const tabscroll=document.getElementById('tabscroll');
const panel=document.getElementById('panel');
const arrowL=document.getElementById('arrowL');
const arrowR=document.getElementById('arrowR');
const thumb=document.getElementById('scrollThumb');
let active=0;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderTabs(){
  tabscroll.innerHTML=SERIES.map((s,i)=>`<button class="tab" role="tab" aria-selected="${i===active}" data-i="${i}">${esc(s.name)}</button>`).join('');
  tabscroll.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
    active=+b.dataset.i;renderTabs();renderPanel();
    b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    window.scrollTo({top:0,behavior:'smooth'});
  }));
}

function renderPanel(){
  const ser=SERIES[active];
  const yr=ser.year?`<span class="yr">${esc(ser.year)}</span>`:"";
  let html=`<div class="panel-intro"><h2>${esc(ser.name)}${yr}</h2><p>${esc(ser.blurb)}</p></div>`;
  html+=`<div class="carousel"><div class="carousel-track" id="track">`;
  ser.cues.forEach(c=>{
    html+=`<div class="cue"><div class="cue-figure"><img src="${CDN+c.img}" alt="${esc(c.alt)}" loading="lazy"></div><div class="cue-info"><div class="model">${esc(c.m)}</div><div class="specs"><div class="spec"><b>Year</b><span>${esc(c.y)}</span></div><div class="spec"><b>Original Price</b><span>${esc(c.p)}</span></div></div><span class="retired-pill">Retired</span></div></div>`;
  });
  html+=`</div>`;
  if(ser.cues.length>1){
    const dots=ser.cues.map((_,i)=>`<button class="car-dot" data-i="${i}" aria-current="${i===0}" aria-label="Go to cue ${i+1}"></button>`).join('');
    html+=`<div class="car-nav"><div class="car-counter" id="carCounter">1 / ${ser.cues.length}</div><div class="car-dots" id="carDots">${dots}</div><div class="car-arrows"><button class="car-btn" id="carPrev" aria-label="Previous cue" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></button><button class="car-btn" id="carNext" aria-label="Next cue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg></button></div></div>`;
  }
  html+=`</div>`;
  if(ser.upsell){
    const u=ser.upsell;
    html+=`<div class="upsell"><div class="kicker">${esc(u.k)}</div><h3>${esc(u.h)}</h3><p>${esc(u.p)}</p><div class="upsell-grid">`+
      u.cards.map(c=>`<a class="up-card" href="#"><div class="thumb"><span>${esc(c[0])}</span></div><div class="body"><div class="name">${esc(c[1])}</div><div class="meta"><span class="now">${esc(c[2])}</span></div></div></a>`).join('')+
      `</div><a class="up-cta" href="#">${esc(u.cta)}</a></div>`;
  }
  panel.innerHTML=html;
  wireCarousel(ser.cues.length);
}

function wireCarousel(count){
  const track=document.getElementById('track');
  if(!track||count<=1) return;
  const prev=document.getElementById('carPrev'),next=document.getElementById('carNext');
  const counter=document.getElementById('carCounter'),dots=document.getElementById('carDots');
  const cards=[...track.querySelectorAll('.cue')];
  const current=()=>{const mid=track.scrollLeft+track.clientWidth/2;let b=0,bd=Infinity;cards.forEach((c,i)=>{const cc=c.offsetLeft+c.offsetWidth/2,d=Math.abs(cc-mid);if(d<bd){bd=d;b=i;}});return b;};
  const goTo=i=>{i=Math.max(0,Math.min(cards.length-1,i));const c=cards[i];track.scrollTo({left:c.offsetLeft-(track.clientWidth-c.offsetWidth)/2,behavior:'smooth'});};
  const update=()=>{const i=current(),max=track.scrollWidth-track.clientWidth;prev.disabled=track.scrollLeft<=1;next.disabled=track.scrollLeft>=max-1;counter.textContent=`${i+1} / ${cards.length}`;dots.querySelectorAll('.car-dot').forEach((d,di)=>d.setAttribute('aria-current',di===i));};
  prev.addEventListener('click',()=>goTo(current()-1));
  next.addEventListener('click',()=>goTo(current()+1));
  dots.querySelectorAll('.car-dot').forEach(d=>d.addEventListener('click',()=>goTo(+d.dataset.i)));
  track.addEventListener('scroll',update,{passive:true});
  update();
}

function pageStrip(dir){tabscroll.scrollBy({left:dir*Math.round(tabscroll.clientWidth*0.7),behavior:'smooth'});}
arrowR.addEventListener('click',()=>pageStrip(1));
arrowL.addEventListener('click',()=>pageStrip(-1));
function updateStrip(){
  const max=tabscroll.scrollWidth-tabscroll.clientWidth,x=tabscroll.scrollLeft;
  arrowL.disabled=x<=1;arrowR.disabled=x>=max-1;
  const ratio=tabscroll.clientWidth/tabscroll.scrollWidth,w=Math.max(ratio*100,8);
  thumb.style.width=w+'%';thumb.style.left=(max>0?(x/max)*(100-w):0)+'%';
}
tabscroll.addEventListener('scroll',updateStrip,{passive:true});
window.addEventListener('resize',updateStrip);

renderTabs();renderPanel();updateStrip();
</script>
